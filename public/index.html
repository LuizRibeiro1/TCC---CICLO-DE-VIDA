<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Casa do Salgado</title>

    <link rel="stylesheet" href="/public/css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

</head>
<body>

    <div class="container">

        <!-- LADO ESQUERDO -->
        <div class="left">

            <div class="logo">

                <div class="telhado"></div>

                <h1>CASA do <br> Salgado</h1>

            </div>

            <div class="texto">

                <h2>Bem-vindo</h2>

                <p>
                    Acesse sua conta ou crie um novo <br>
                    cadastro para começar a usar a plataforma.
                </p>

            </div>

            <div class="buttons">

                <button>CADASTRAR</button>

                <button>LOGIN</button>

            </div>

        </div>

        <!-- LADO DIREITO -->
        <div class="right">

            <div class="login-box">

                <input type="text" id="cpf" placeholder="CPF">

                <input type="password" placeholder="SENHA">

                <button>ENTRAR</button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
